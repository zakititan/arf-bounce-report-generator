<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Report Generator</title>
<link rel="icon" type="image/svg+xml" href="/public/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg: #f7f6f2; --color-surface: #f9f8f5;
  --color-border: #d4d1ca; --color-divider: #dcd9d5;
  --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4;
  --color-text-inverse: #f9f8f4;
  --color-primary: #01696f; --color-primary-hover: #0c4e54;
  --color-error: #a12c7b;
  --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem;
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --font-body: 'Inter', system-ui, sans-serif;
  --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem;
  --text-xs: 0.8rem; --text-sm: 0.9rem; --text-base: 1rem; --text-lg: 1.25rem;
}
[data-theme="dark"] {
  --color-bg: #171614; --color-surface: #1c1b19;
  --color-border: #393836; --color-divider: #262523;
  --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
  --color-text-inverse: #2b2a28;
  --color-primary: #4f98a3; --color-primary-hover: #227f8b;
  --color-error: #d163a7;
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --color-bg:#171614;--color-surface:#1c1b19;--color-border:#393836;
    --color-divider:#262523;--color-text:#cdccca;--color-text-muted:#797876;
    --color-text-faint:#5a5957;--color-text-inverse:#2b2a28;
    --color-primary:#4f98a3;--color-primary-hover:#227f8b;
    --color-error:#d163a7;--shadow-md:0 4px 12px oklch(0 0 0/.3);
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  min-height: 100dvh; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-body); font-size: var(--text-base);
  color: var(--color-text); background: var(--color-bg);
  padding: var(--space-4);
}
input, button { font: inherit; color: inherit; }
button { cursor: pointer; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-md); }

.card {
  width: 100%; max-width: 380px;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-xl); box-shadow: var(--shadow-md);
  padding: var(--space-8);
  display: flex; flex-direction: column; gap: var(--space-5);
}
.card-header { display: flex; flex-direction: column; align-items: center; gap: var(--space-3); text-align: center; }
.logo-icon { width: 40px; height: 40px; }
.card-title { font-size: var(--text-lg); font-weight: 600; }
.card-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); }

.field { display: flex; flex-direction: column; gap: var(--space-2); }
.field label { font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); }
.input-wrap { position: relative; }
input[type="password"], input[type="text"] {
  width: 100%; padding: var(--space-3) var(--space-8) var(--space-3) var(--space-3);
  background: var(--color-bg); border: 1px solid var(--color-border);
  border-radius: var(--radius-md); font-size: var(--text-base); color: var(--color-text);
  transition: border-color 180ms ease, box-shadow 180ms ease;
}
input:focus {
  outline: none; border-color: var(--color-primary);
  box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15);
}
.toggle-pw {
  position: absolute; right: var(--space-3); top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--color-text-faint); padding: 2px;
  display: flex; align-items: center;
}
.toggle-pw:hover { color: var(--color-text-muted); }

.btn-submit {
  width: 100%; padding: var(--space-3); border-radius: var(--radius-md);
  background: var(--color-primary); color: var(--color-text-inverse);
  border: none; font-size: var(--text-base); font-weight: 600;
  transition: background 180ms ease;
  display: flex; align-items: center; justify-content: center; gap: var(--space-2);
  min-height: 46px;
}
.btn-submit:hover { background: var(--color-primary-hover); }
.btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

.error-msg {
  display: none; font-size: var(--text-xs); color: var(--color-error);
  background: color-mix(in oklch, var(--color-error) 8%, var(--color-surface));
  border: 1px solid color-mix(in oklch, var(--color-error) 20%, var(--color-border));
  border-radius: var(--radius-md); padding: var(--space-2) var(--space-3);
  text-align: center;
}
.error-msg.visible { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
      <rect width="40" height="40" rx="10" fill="var(--color-primary)" opacity="0.15"/>
      <rect x="8" y="10" width="14" height="2.5" rx="1.25" fill="var(--color-primary)"/>
      <rect x="8" y="16" width="24" height="2.5" rx="1.25" fill="var(--color-primary)"/>
      <rect x="8" y="22" width="18" height="2.5" rx="1.25" fill="var(--color-primary)"/>
      <circle cx="30" cy="11" r="5" fill="var(--color-primary)"/>
      <path d="M28 11l1.5 1.5L32 9" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="card-title">Report Generator</div>
      <div class="card-subtitle">Enter your password to continue</div>
    </div>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="field" style="margin-bottom: var(--space-4);">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" autocomplete="current-password"
               placeholder="Enter password" required autofocus>
        <button type="button" class="toggle-pw" onclick="togglePw()" aria-label="Toggle password visibility" tabindex="-1">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>
    <button type="submit" class="btn-submit" id="submit-btn" style="margin-top: var(--space-3);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Unlock
    </button>
  </form>
</div>

<script>
(function(){
  const dark = matchMedia('(prefers-color-scheme:dark)').matches;
  if (dark) document.documentElement.setAttribute('data-theme','dark');
})();

function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('error-msg');

  btn.disabled = true;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Checking…';
  err.classList.remove('visible');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });

    if (res.ok) {
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || '/';
    } else {
      err.classList.add('visible');
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Unlock';
      document.getElementById('password').select();
    }
  } catch {
    err.textContent = 'Network error. Please try again.';
    err.classList.add('visible');
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Unlock';
  }
}
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
